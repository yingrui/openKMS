# Full stack: Postgres (pgvector), MinIO, backend API, worker (+ openkms-cli), frontend (nginx).
#
# From repo root (examples):
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml up -d --build
#   docker compose -f docker/docker-compose.yml down
# Plain `docker compose up` without --build reuses cached images and can miss new migrations.
#
# Requires ../backend/.env (copy from backend/.env.example). Compose overrides DB host,
# MinIO URL, frontend URL for Docker networking.
#
# UI (and /api, /internal-api via nginx): http://localhost:8082 — backend is not published on the host.
# Neo4j on host (defaults +2 if 7474/7687 busy): Browser http://localhost:7476 — Bolt localhost:7689.
# Inside Docker / Console data source: host neo4j, port 7687 (container port, not the host map).
# Document parsing in the worker calls VLM on the host: set OPENKMS_VLM_URL or use defaults below.
#
# Build mirrors (China mainland defaults). Override or disable in docker/.env, e.g. APT_MIRROR= for upstream Debian.
# Python: Tsinghua TUNA PyPI · npm: npmmirror (原淘宝镜像).

x-build-mirror-args: &build_mirror_args
  APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
  UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
  UV_EXTRA_INDEX_URL: ${UV_EXTRA_INDEX_URL:-https://pypi.org/simple}
  NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}

x-backend-env: &backend_env
  OPENKMS_AUTH_MODE: local
  OPENKMS_DATABASE_HOST: postgres
  OPENKMS_DATABASE_PORT: "5432"
  OPENKMS_DATABASE_USER: postgres
  OPENKMS_DATABASE_PASSWORD: postgres
  OPENKMS_DATABASE_NAME: openkms
  AWS_ENDPOINT_URL: http://minio:9000
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_BUCKET_NAME: openkms
  AWS_REGION: us-east-1
  OPENKMS_FRONTEND_URL: http://localhost:8082
  OPENKMS_DEBUG: "true"
  OPENKMS_BACKEND_URL: http://backend:8102
  OPENKMS_CLI_BASIC_USER: openkms-cli
  OPENKMS_CLI_BASIC_PASSWORD: change-me

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openkms
    # Volume name includes major PG so upgrading the image does not reuse an incompatible
    # older cluster (e.g. PG13 data with a PG16 image). Remove stale volumes: docker volume ls | grep postgres
    volumes:
      - openkms_postgres_pg16:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO S3 API (9000) and console (9001) are not published on the host; backend/worker use
  # http://minio:9000. Browser access to objects goes through the frontend nginx bucket proxy.
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    # Pin tag for reproducible pulls; do not set NEO4J_PLUGINS=[] (can break startup on some images).
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/openkms-neo4j-dev
    volumes:
      - neo4j_data:/data
    ports:
      - "7476:7474"
      - "7689:7687"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p openkms-neo4j-dev 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
      args:
        <<: *build_mirror_args
    env_file:
      - ../backend/.env
    environment:
      <<: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # PaddleOCR / paddlepaddle PyPI wheels are linux/amd64 (and macOS arm64), not linux/arm64.
  # On Apple Silicon, this forces an amd64 image so openkms-cli[parse] installs; runs under QEMU.
  worker:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
      args:
        <<: *build_mirror_args
    env_file:
      - ../backend/.env
    environment:
      <<: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        <<: *build_mirror_args
        VITE_API_URL: ""
        VITE_AUTH_MODE: local
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  openkms_postgres_pg16: {}
  minio_data: {}
  neo4j_data: {}
