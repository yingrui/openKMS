site_name: openKMS
site_description: Open Knowledge Management System — documents, articles, knowledge bases, wiki, and Q&A.
site_url: https://yingrui.github.io/openKMS/
repo_url: https://github.com/yingrui/openKMS
repo_name: yingrui/openKMS
edit_uri: edit/main/docs/
docs_dir: docs
dev_addr: 127.0.0.1:8104

theme:
  name: material
  language: en
  features:
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - i18n:
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true
          site_name: openKMS
          site_description: 开放知识管理系统 — 文档、文章、知识库、维基与问答。
          theme:
            language: zh
            palette:
              - media: "(prefers-color-scheme: light)"
                toggle:
                  name: 切换到深色模式
              - media: "(prefers-color-scheme: dark)"
                toggle:
                  name: 切换到浅色模式
          nav_translations:
            Home: 首页
            Goals (vision): 目标与愿景
            Quickstart: 快速开始
            Architecture: 架构
            Features: 功能
            Index: 索引
            Knowledge types: 知识类型
            Infrastructure & quality: 基础设施与质量
            Documents: 文档
            Articles: 文章
            Knowledge bases: 知识库
            Wiki spaces: 维基空间
            Evaluation: 评测
            Glossaries: 术语表
            Knowledge map & home: 知识地图与首页
            Global search: 全局搜索
            Ontology — objects, links, datasets: 本体 — 对象、关系与数据集
            Pipelines, jobs & models: 流水线、任务与模型
            Data security: 数据安全
            Console & authentication: 控制台与认证
            Agents (project workspaces): Agent（项目工作区）
            OpenCode skill (openkms): OpenCode 技能（openkms）
            API reference: API 参考
            Data models: 数据模型
            Configuration: 配置
            Security: 安全
            Operations: 运维
            Docker: Docker
            Developer: 开发者
            Setup: 环境搭建
            Doc conventions for AI agents: AI 代理文档规范
            Roadmap: 路线图
            Development plan: 开发计划
            Tech debt: 技术债
            Wiki agent prototype: 维基 Agent 原型
            Research: 研究
            LLM wiki vs openKMS: LLM wiki 与 openKMS
            RAGFlow vs openKMS: RAGFlow 与 openKMS
            Confluence AI vs openKMS: Confluence AI 与 openKMS
            KM dimension — Operational Knowledge Fitness: 知识管理维度 — 运营知识健康度
            Text content evaluation: 文本内容评测
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yingrui/openKMS
  generator: false

exclude_docs: |
  README.md

nav:
  - Home: index.md
  - Goals (vision): goals.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Features:
      - Index: functionalities.md
      - Knowledge types: features/knowledge-types.md
      - Infrastructure & quality: features/infrastructure.md
      - Documents: features/documents.md
      - Articles: features/articles.md
      - Knowledge bases: features/knowledge-bases.md
      - Wiki spaces: features/wiki-spaces.md
      - Evaluation: features/evaluation.md
      - Glossaries: features/glossaries.md
      - Knowledge map & home: features/knowledge-map.md
      - Global search: features/global-search.md
      - Ontology — objects, links, datasets: features/ontology.md
      - Pipelines, jobs & models: features/pipelines-and-jobs.md
      - Data security: features/data-security.md
      - Console & authentication: features/console-and-auth.md
      - Agents (project workspaces): features/openkms-agents.md
      - OpenCode skill (openkms): features/opencode-openkms-skill.md
      - API reference: features/api-reference.md
      - Data models: features/data-models.md
      - Configuration: features/configuration.md
  - Security: security.md
  - Operations:
      - Docker: operations/docker.md
  - Developer:
      - Setup: developer/setup.md
      - Doc conventions for AI agents: agents.md
  - Roadmap:
      - Development plan: development_plan.md
      - Tech debt: tech_debt.md
      - Wiki agent prototype: wiki_agent_prototype.md
  - Research:
      - LLM wiki vs openKMS: research/llm_wiki_comparison.md
      - RAGFlow vs openKMS: research/ragflow_vs_openkms.md
      - Confluence AI vs openKMS: research/confluence_ai_vs_openkms.md
      - KM dimension — Operational Knowledge Fitness: research/km_dimension_operational_fitness.md
      - Text content evaluation: research/text_content_evaluation.md
